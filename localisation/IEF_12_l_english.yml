  # Events
  IEF.12_crown_protector_system_update.t: "The Burden of Protection"
  IEF.12_crown_protector_system_update.d: "Our vast network of Crown Protectors requires extensive administrative oversight. The larger and more developed our subjects become, the harder it is to govern our own expanding empire efficiently."
  IEF.12_crown_protector_system_update.a: "System Updated"
  IEF.14_crown_protector_introduction.t: "New Subject Mechanics: Crown Protectors"
  IEF.14_crown_protector_introduction.d: "A dynamic scaling system is in effect for the 'Crown Protector' subject type. As the total development of your Crown Protectors increases, two background systems will actively scale your country's modifiers:\n\n§RAdministrative Burden:§!\nGoverning your subjects requires extensive administrative oversight. Based on their total development, a scaling penalty will be applied to your Governing Capacity. This penalty hits aggressively in the early stages of your expansion—reducing your capacity by up to 35% at just 2,000 development. It continues to grow steadily as your subjects expand, scaling up to a crushing maximum of -99% Governing Capacity.\n\n§GTrade Dominance:§!\nTo offset the administrative burden, you will extract significant economic value from these subjects in the form of extra Merchants. The growth rate of this bonus slows down as your subjects grow larger:\n- 0 to 100 Dev: +1 Merchant\n- Up to 2,000 Dev: +1 Merchant per 200 Dev\n- Up to 5,000 Dev: +1 Merchant per 500 Dev\n- Up to 20,000 Dev: +1 Merchant per 1,000 Dev\n- Up to 50,000 Dev: +1 Merchant per 5,000 Dev\nThis system provides a maximum of 39 additional Merchants at 50,000+ development.\n\nThese modifiers are recalculated dynamically. Balance your empire's administrative limits against the lucrative trade opportunities your subjects provide."
  IEF.14_crown_protector_introduction.a: "Understood." 
  IEF.15_crown_protector_update.t: "Crown Protector Network Updated"
  IEF.15_crown_protector_update.d: "My liege, the latest reports from our Crown Protectors have arrived. Their total development and economic output have crossed a new threshold over the past year.\n\nOur administrative network and trade routes have been automatically adjusted to reflect their new size."
  IEF.15_crown_protector_update.a: "Excellent."
  IEF.15_crown_protector_update_tt: "Our Governing Capacity and Merchant modifiers from Crown Protectors have been scaled to a new tier."