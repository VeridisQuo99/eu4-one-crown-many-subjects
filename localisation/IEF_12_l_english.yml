  # New Diplomatic Actions
  establish_crown_protector: "Establish a Protector of the Crown"
  establish_crown_protector_title: "Establish a Protector of the Crown"
  establish_crown_protector_tooltip: "Establish a Protector of the Crown"
  establish_crown_protector_alert_tooltip: "Establish a Protector of the Crown"
  establish_crown_protector_desc: "Establishing a Protector of the Crown creates a highly autonomous but economically integrated subject. They serve as an extension of our decentralized empire, managing local administrative affairs while directly feeding our global trade network."
  
  isolate_crown_protector: "Isolate Crown Protector"
  isolate_crown_protector_title: "Isolate Crown Protector"
  isolate_crown_protector_tooltip: "Isolate Crown Protector"
  isolate_crown_protector_alert_tooltip: "Isolate Crown Protector"
  isolate_crown_protector_desc: "Revoking their sovereign right to autonomously declare wars and form alliances will severely isolate them on the world stage. This heavy-handed diplomatic restriction will deeply anger their rulers and spark a strong desire for liberty."
  
  empower_crown_protector: "Restore Diplomatic Rights"
  empower_crown_protector_title: "Restore Diplomatic Rights"
  empower_crown_protector_tooltip: "Restore Diplomatic Rights"
  empower_crown_protector_alert_tooltip: "Restore Diplomatic Rights"
  empower_crown_protector_desc: "Restoring their autonomous diplomatic rights will lift the isolation previously imposed upon them. This act of grace will mend our fractured relations and help quell their rebellious spirits."

  # Opinion Modifiers
  isolated_by_overlord: "Imposed Diplomatic Isolation"
  isolated_by_overlord_desc: "Our supposed protectors have stripped us of our sovereign right to conduct diplomacy, isolating us from the rest of the world."

  # Static Modifiers
  crown_protector_modifier: "Royal Protector Base Modifier"
  crown_protector_modifier_desc: "The base modifier for the Protector of the Crown subject type, defining their foundational diplomatic and economic capabilities within the empire."

  # Subject Types
  crown_protector: "Protector of the Crown"
  crown_protector_long_desc: "A Protector of the Crown is a highly integrated subject state, sworn to serve the economic and strategic interests of their overlord. While they maintain significant local autonomy and their own diplomatic relations, their vast trade networks are firmly bound to the crown.\n"
  crown_protector_is_our: "$NAME|Y$ is a Protector of the Crown under our rule"
  crown_protector_title: "Protector of the Crown"
  crown_protector_title_plural: "Protectors of the Crown"
  is_crown_protector: "Is Protector of the Crown"
  
  peaceful_crown_protector: "Isolated Crown Protector"
  peaceful_crown_protector_long_desc: "An Isolated Crown Protector is a subject state that has been entirely stripped of its independent diplomatic rights. Forbidden from forming alliances or declaring wars, they exist solely as a commercial asset to enrich their overlord.\n"
  peaceful_crown_protector_is_our: "$NAME|Y$ is an Isolated Crown Protector under our rule"
  peaceful_crown_protector_title: "Isolated Crown Protector"
  peaceful_crown_protector_title_plural: "Isolated Crown Protectors"
  is_peaceful_crown_protector: "Is Isolated Crown Protector"

  # Events
  IEF.12_crown_protector_system_update.t: "The Burden of Protection"
  IEF.12_crown_protector_system_update.d: "Our vast network of Crown Protectors requires extensive administrative oversight. As these subjects grow more developed and powerful, managing their affairs alongside our own expanding empire becomes an increasingly complex logistical challenge."
  IEF.12_crown_protector_system_update.a: "Adjust the administration."
  
  IEF.13_clearing_crown_protector_debuff.t: "Collapse of the Protectorate Network"
  IEF.13_clearing_crown_protector_debuff.d: "With the loss of our final Crown Protector, the extensive administrative and trade network we painstakingly established has dissolved. The severe governing burdens it placed upon our bureaucracy, as well as the lucrative global trade benefits we reaped from it, have both been lifted from our empire."
  IEF.13_clearing_crown_protector_debuff.a: "A new era begins."
  
  IEF.14_crown_protector_introduction.t: "New Subject Mechanics: Crown Protectors"
  IEF.14_crown_protector_introduction.d: "A dynamic scaling system is now active for the 'Crown Protector' subject type. As the total development of your Crown Protectors increases, two background systems will automatically scale your nation's modifiers:\n\n§RAdministrative Burden:§!\nGoverning your subjects requires extensive administrative oversight. Based on their combined development, a scaling penalty will be applied to your Governing Capacity. This penalty hits aggressively during your early expansion—reducing your capacity by up to 35% at just 2,000 development—and continues to grow steadily, reaching a crushing maximum of -99% Governing Capacity as your subjects expand.\n\n§GTrade Dominance:§!\nTo offset this administrative strain, you will extract significant economic value in the form of extra Merchants. The growth rate of this bonus slows down as your subjects grow larger:\n- 0 to 100 Dev: +1 Merchant\n- Up to 2,000 Dev: +1 Merchant per 200 Dev\n- Up to 5,000 Dev: +1 Merchant per 500 Dev\n- Up to 20,000 Dev: +1 Merchant per 1,000 Dev\n- Up to 50,000 Dev: +1 Merchant per 5,000 Dev\nThis system provides a maximum of 39 additional Merchants at 50,000+ development.\n\nThese modifiers are recalculated dynamically. Balance your empire's internal administrative limits against the lucrative global trade opportunities your subjects provide."
  IEF.14_crown_protector_introduction.a: "We shall balance the scales." 
  
  IEF.15_crown_protector_update.t: "Crown Protector Network Updated"
  IEF.15_crown_protector_update.d: "My liege, the latest reports from our Crown Protectors have arrived at the capital. Their total development and economic output have crossed a new threshold over the past year.\n\nOur central administrative network and global trade routes have been automatically adjusted to reflect their new size and influence."
  IEF.15_crown_protector_update.a: "Excellent."
  IEF.15_crown_protector_update_tt: "Our Governing Capacity and Merchant modifiers from Crown Protectors have been scaled to a new tier."